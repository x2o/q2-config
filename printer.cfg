[motor_constants qidi_x_y]
# Coil resistance, Ohms
resistance: 3.7
# Coil inductance, Henries
inductance: 0.004
# Holding torque, Nm
holding_torque: 0.73
# Nominal rated current, Amps
max_current: 2.0
# Steps per revolution (1.8deg motors use 200, 0.9deg motors use 400)
steps_per_revolution: 200


[stepper_x]
step_pin:PB4
dir_pin:!PB3
enable_pin:!PB5
microsteps:16
rotation_distance: 38.82
full_steps_per_rotation:200  
endstop_pin:tmc2240_stepper_x:virtual_endstop
position_min: -1
position_endstop: 271
position_max:275
homing_speed:50
homing_retract_dist:0
homing_positive_dir:true
#step_pulse_duration:0.0000001

[stepper_y]
step_pin:PC14
dir_pin:!PC13
enable_pin:!PC15
microsteps: 16
rotation_distance: 38.82
full_steps_per_rotation:200  
endstop_pin:tmc2240_stepper_y:virtual_endstop
position_min: -1
position_endstop: -1
position_max: 295
homing_speed:50
homing_retract_dist:0
homing_positive_dir:False
#step_pulse_duration:0.0000001




[stepper_z]
step_pin:PC10
dir_pin:PA15
enable_pin:!PC11
microsteps: 128
rotation_distance: 4
full_steps_per_rotation: 200
endstop_pin:probe:z_virtual_endstop 
endstop_pin_reverse:tmc2209_stepper_z:virtual_endstop
#position_endstop:0
position_endstop_reverse:260
position_max:265
position_min: -2
homing_speed: 10
second_homing_speed: 5
homing_retract_dist: 10.0
homing_positive_dir:false
homing_positive_dir_reverse:true
#step_pulse_duration:0.0000001


[stepper_z1]
step_pin:PB1
dir_pin:PB6
enable_pin:!PB0
microsteps: 128
rotation_distance: 4
full_steps_per_rotation: 200
endstop_pin_reverse:tmc2209_stepper_z1:virtual_endstop
#step_pulse_duration:0.0000001



[z_tilt]
z_positions:
    -15,137
    285,137

points:
    10,137
    260,137

speed: 150
horizontal_move_z: 5
retries: 2
retry_tolerance: 0.05


[tmc2240 stepper_x]
spi_software_sclk_pin:PA5
spi_software_miso_pin:PA6
spi_software_mosi_pin:PA7
spi_speed:200000
cs_pin:PC12
diag0_pin:!PB8
interpolate:true
run_current: 1.07
stealthchop_threshold:0
driver_SGT:1
#driver_SLOPE_CONTROL:2



[tmc2240 stepper_y]
spi_software_sclk_pin:PA5
spi_software_miso_pin:PA6
spi_software_mosi_pin:PA7
spi_speed:200000
cs_pin:PD2
diag0_pin:!PC0
interpolate:true
run_current: 1.07
stealthchop_threshold:0
driver_SGT:1
#driver_SLOPE_CONTROL:2



[tmc2209 stepper_z]
uart_pin: PC5
run_current: 1.07
#hold_current: 0.17
interpolate: True
stealthchop_threshold: 9999999999
diag_pin:^PC1
driver_SGTHRS:140

[tmc2209 stepper_z1]
uart_pin: PB7
run_current: 1.07
#hold_current: 0.17
interpolate: True
stealthchop_threshold: 9999999999
diag_pin:^PA14
driver_SGTHRS:140

[heater_bed]
heater_pin: PC7
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin: PA4
max_power: 1.0
#control = pid
# pid_Kp=63.418 
# pid_Ki=1.342 
# pid_Kd=749.125
#pid_Kp=71.231 
#pid_Ki=1.218 
#pid_Kd=1041.758
pwm_cycle_time:0.1
min_temp: -60
max_temp: 125

[heater_generic chamber]
heater_pin:PC8
max_power:1
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin:PA1

control = pid
pid_Kp=63.418 
pid_Ki=1.342 
pid_Kd=749.125

min_temp:-100
max_temp:70
z_max_limit:230

[verify_heater chamber]
max_error: 300
check_gain_time:480
hysteresis: 5
heating_gain: 1


[temperature_sensor Chamber_Thermal_Protection_Sensor]
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin:PA2
min_temp:-100
max_temp:150

[verify_heater extruder]
max_error: 120            
check_gain_time:20        
hysteresis: 2             
heating_gain: 2           

[verify_heater heater_bed]
max_error: 400            
check_gain_time:120       
hysteresis: 2             
heating_gain: 1           

[fan_generic chamber_circulation_fan]
pin: PA10                
shutdown_speed: 1.0      
cycle_time: 0.0100        
hardware_pwm: false       
kick_start_time: 0.100    
off_below: 0.0            

[controller_fan chamber_fan]
pin:PB14                  
max_power: 1.0            
shutdown_speed: 1.0         
kick_start_time: 0.5      
heater:chamber            
fan_speed: 1.0            
off_below: 0              
tachometer_pin:PC6        
tachometer_ppr: 2        
tachometer_poll_interval: 0.0015  
stepper:                  


 
[heater_fan hotend_fan]
pin:THR:PA11
max_power: 1.0           
shutdown_speed:1.0       
kick_start_time: 0.5     
heater: extruder          
heater_temp: 50.0       
fan_speed: 1.0         
off_below: 0            
tachometer_pin:THR:PA12
tachometer_ppr: 2
tachometer_poll_interval: 0.0005

[fan_generic cooling_fan]
pin:THR:PA8               
max_power: 1.0            
shutdown_speed:0          
cycle_time: 0.010         
hardware_pwm: False       
kick_start_time: 0.100    
off_below: 0.0            
tachometer_pin:THR:PA9    
tachometer_ppr: 2        
tachometer_poll_interval: 0.0015  

[controller_fan board_fan]
pin:PA9                   
max_power:1.0            
shutdown_speed:1.0       
cycle_time:0.01         
fan_speed: 1.0          
stepper:stepper_z,stepper_z1  



[fan_generic auxiliary_cooling_fan]
pin:PB15                  
shutdown_speed: 0.0       
cycle_time: 0.0100        
hardware_pwm: false       
kick_start_time: 0.100    
off_below: 0.0            
tachometer_pin:PC4        
tachometer_ppr: 2        
tachometer_poll_interval: 0.0015  

