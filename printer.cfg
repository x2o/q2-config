[output_pin polar_cooler]
pin: PB10                
pwm: false                
shutdown_value:0          
value:0  
[smart_output_pin polar_cooler]               

[output_pin beeper]
pin:PC2                 
pwm: false              
shutdown_value:0        
value:0     

[smart_output_pin beeper]       

[output_pin caselight]
pin:PC9
pwm: false
shutdown_value:0
value:1

[smart_output_pin caselight]  

[gcode_arcs]
resolution: 1.0


# [neopixel RGB]
# pin:PA10                  
# #   连接到neopixel的引脚。
# #   必须提供此参数。
# chain_count:25
# #   菊链中 neopixel 芯片的数量。
# #   默认为1（代表有一个neopixel芯片连接到了这个引脚）。
# color_order: GRB
# #   设置LED硬件的RGB像素顺序（提供一个包含字母R（红），G（绿）
# #   ，B（蓝）和W（白）的字符串，W是可选的）。或者也可以用一个
# #   逗号分隔字符列表来描述像素顺序。
# #   默认为GRB。
# initial_RED: 0.0
# initial_GREEN: 0.0
# initial_BLUE: 0.0
# initial_WHITE: 0.0

[probe_air]
sensor_type: c_sensor      
sclk_pin: THR:PB3          
dout_pin:THR: PB4          
voltage: 4.95             
delta_v: 0.08             
z_offset:-0.07           
speed: 5                
lift_speed:5               
samples: 2                
sample_retract_dist:3     
samples_result: average   
samples_tolerance: 0.02   
samples_tolerance_retries: 10  

# [motion_accuracy_calibration]
# sampling_points_x: 8
# sampling_points_y: 8
# grid_target: 22
# algo: rbf
# if_compensate_xy: true #默认开启
# spacing: 50
# gain_x: 1.0
# gain_y: 1.0
# low_height: -1.2
# high_height: 5.

[bed_mesh]
speed: 100 #100
horizontal_move_z:5
mesh_min:10,10
mesh_max:260,260  
probe_count:6,6
algorithm:lagrange#bicubic
#bicubic_tension:0.2
mesh_pps: 2, 2
#fade_target:0

[idle_timeout]
timeout: 43200            
gcode:                   
    M118 Pause Timeout: Turn off heaters 
    #PRINT_END              
    M106 S0                
    M104 S0               
    M140 S0                
    M141 S0                 
    DISABLE_BOX_HEATER     
    _KM_IDLE_TIMEOUT       


[pause_resume]


[display_status]


[exclude_object]


[print_stats_manager]


[virtual_sdcard]
path: ~/printer_data/gcodes  # G代码文件路径
on_error_gcode: CANCEL_PRINT # 出错时取消打印

# ============ 多色配置 ============
[include box.cfg]
# [database]
[multi_color_controller]

[d_bus_service_manager]

[ai_func_manager]

