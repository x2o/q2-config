step_pin_1: mcu_box1:PB9
dir_pin_1: mcu_box1:PB8
enable_pin_1: !mcu_box1:PC0
white_pin_1: mcu_box1:PB4
red_pin_1: mcu_box1:PB5
runout_pin_2: mcu_box1:PA13
step_pin_2: mcu_box1:PC12
dir_pin_2: mcu_box1:PC11
enable_pin_2: !mcu_box1:PD2
white_pin_2: mcu_box1:PA14
red_pin_2: mcu_box1:PA15
runout_pin_3: mcu_box1:PA7
step_pin_3: mcu_box1:PC8
dir_pin_3: mcu_box1:PB2
enable_pin_3: !mcu_box1:PC10
white_pin_3: mcu_box1:PC4
red_pin_3: mcu_box1:PC5
microsteps: 16
rotation_distance: 13.6
step_pulse_duration:0.000000100
heater_pin_heater_generic: mcu_box1:PA3
sensor_type_heater_generic: AHT20_F
i2c_bus_heater_generic: i2c3
i2c_mcu_heater_generic: mcu_box1
i2c_address_heater_generic: 56
control_heater_generic: pid
pid_Kp_heater_generic: 63.418
pid_Ki_heater_generic: 1.342
pid_Kd_heater_generic: 749.125
min_temp_heater_generic: -100
max_temp_heater_generic: 100
target_max_temp_heater_generic: 90
max_error_verify_heater: 400
check_gain_time_verify_heater: 600
is_box_heater_verify_heater: True
sensor_type_temperature_sensor_0: NTC 100K MGB18-104F39050L32
sensor_pin_temperature_sensor_0: mcu_box1:PC1
min_temp_temperature_sensor_0: -100
max_temp_temperature_sensor_0: 130
sensor_type_temperature_sensor_1: NTC 100K MGB18-104F39050L32
sensor_pin_temperature_sensor_1: mcu_box1:PC2
min_temp_temperature_sensor_1: -100
max_temp_temperature_sensor_1: 130
pin_box_heater_fan_0: mcu_box1:PA4
heater_box_heater_fan_0: heater_box1
heater_temp_box_heater_fan_0: 35
stepper_box_heater_fan_0:
idle_timeout_box_heater_fan_0: 60
pin_box_heater_fan_1: mcu_box1:PA5
heater_box_heater_fan_1: heater_box1
heater_temp_box_heater_fan_1: 35
stepper_box_heater_fan_1:
idle_timeout_box_heater_fan_1: 60
pin_controller_fan: mcu_box1:PA6
heater_controller_fan: heater_box1
stepper_controller_fan: slot0, slot1, slot2, slot3
cs_pin_box_rfid_0: mcu_box1:PC6
cs_pin_box_rfid_1: mcu_box1:PC7

[box_extras]
b_button_pin : ^mcu_box1:PB1
b_endstop_pin : mcu_box1:PA9
e_endstop_pin : mcu_box1:PA10

buffer_pin : ^mcu_box1:PB0
[mcu mcu_box1]
serial: /dev/serial/by-id/usb-Klipper_QIDI_BOX_V2_1.1.3_0F005E001451353035333335-if00
restart_method : command

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer.save_variables.variables.enable_box == 1 %}
        {% set T = params.T|int %}
        CUT_FILAMENT T={T}
        MOVE_TO_TRASH
        UNLOAD_T{T}
        G1 E25 F300
        M104 S0
        CLEAR_OOZE
        CLEAR_FLUSH
    {% endif %}

[gcode_macro T0]
gcode:
    {% set slot = printer.save_variables.variables.value_t0|default('slot0') %}
    {% if printer.save_variables.variables.enable_box == 1 %}
        EXTRUDER_LOAD SLOT={slot}
    {% endif %}

[gcode_macro UNLOAD_T0]
gcode:
    {% set slot = printer.save_variables.variables.value_t0|default('slot0') %}
    {% if printer.save_variables.variables.enable_box == 1 %}
        EXTRUDER_UNLOAD SLOT={slot}
    {% endif %}

